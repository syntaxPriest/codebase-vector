services:
  backend:
    build:
      context: ./backend
    ports:
      - "4112:4111"
    env_file:
      - ./backend/mastra/.env
    volumes:
      - ./backend/mastra:/app/mastra
      - /app/mastra/node_modules
    environment:
      - MASTRA_HOST=0.0.0.0

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
